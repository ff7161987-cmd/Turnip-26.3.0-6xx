name: Build Turnip

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build patchelf unzip flex bison git perl python3-pip \
            glslang-tools curl zip libclc-18-dev libva-dev pkg-config \
            python3-mako python3-jinja2
          pip3 install --break-system-packages meson mako

      - name: Build Drivers
        run: |
          chmod +x build_turnip.sh
          export BUILD_VERSION="${{ github.run_number }}"
          ./build_turnip.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-Drivers
          path: turnip_workdir/*.zip

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: turnip_workdir/*.zip
